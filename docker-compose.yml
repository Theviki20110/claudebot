services:
  claude-api:
    build: .
    command: uv run claude_server.py
    ports:
      - "8080:8080"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./workspace:/workspace
    restart: unless-stopped

  telegram-bot:
    build: .
    command: uv run bot_telegram.py
    environment:
      - CLAUDE_URL=http://claude-api:8080
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./workspace:/workspace
    depends_on:
      - claude-api
    restart: unless-stopped
